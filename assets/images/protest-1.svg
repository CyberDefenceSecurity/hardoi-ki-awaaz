<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6f00"/>
      <stop offset="100%" style="stop-color:#e65100"/>
    </linearGradient>
    <linearGradient id="ground1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4e342e"/>
      <stop offset="100%" style="stop-color:#3e2723"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky1)"/>
  <!-- Sun -->
  <circle cx="650" cy="80" r="40" fill="rgba(255,255,255,0.3)"/>
  <circle cx="650" cy="80" r="25" fill="#fff" opacity="0.4"/>
  <!-- Ground -->
  <rect x="0" y="350" width="800" height="150" fill="url(#ground1)"/>
  <!-- Background building -->
  <rect x="580" y="180" width="100" height="170" fill="rgba(255,255,255,0.1)"/>
  <rect x="620" y="160" width="40" height="20" fill="rgba(255,255,255,0.12)"/>
  <rect x="450" y="200" width="80" height="150" fill="rgba(255,255,255,0.08)"/>
  <!-- People silhouette crowd -->
  <g fill="rgba(0,0,0,0.4)">
    <!-- Person 1 -->
    <circle cx="200" cy="300" r="18"/>
    <rect x="192" y="318" width="16" height="35" rx="3"/>
    <!-- Person 2 -->
    <circle cx="250" cy="295" r="18"/>
    <rect x="242" y="313" width="16" height="35" rx="3"/>
    <!-- Person 3 -->
    <circle cx="300" cy="305" r="18"/>
    <rect x="292" y="323" width="16" height="35" rx="3"/>
    <!-- Person 4 -->
    <circle cx="350" cy="290" r="18"/>
    <rect x="342" y="308" width="16" height="35" rx="3"/>
    <!-- Person 5 -->
    <circle cx="400" cy="300" r="18"/>
    <rect x="392" y="318" width="16" height="35" rx="3"/>
    <!-- Person 6 -->
    <circle cx="150" cy="310" r="16"/>
    <rect x="143" y="326" width="14" height="30" rx="3"/>
    <!-- Person 7 -->
    <circle cx="450" cy="295" r="17"/>
    <rect x="443" y="312" width="14" height="32" rx="3"/>
  </g>
  <!-- Protest signs -->
  <g>
    <rect x="188" y="270" width="4" height="48" fill="#795548"/>
    <rect x="185" y="262" width="10" height="12" fill="#fff" rx="1"/>
    <rect x="238" y="265" width="4" height="48" fill="#795548"/>
    <rect x="235" y="257" width="10" height="12" fill="#fff" rx="1"/>
    <rect x="288" y="275" width="4" height="48" fill="#795548"/>
    <rect x="285" y="267" width="10" height="12" fill="#fff" rx="1"/>
    <rect x="338" y="260" width="4" height="48" fill="#795548"/>
    <rect x="335" y="252" width="10" height="12" fill="#fff" rx="1"/>
    <rect x="388" y="270" width="4" height="48" fill="#795548"/>
    <rect x="385" y="262" width="10" height="12" fill="#fff" rx="1"/>
  </g>
  <!-- Raised fists -->
  <g fill="rgba(0,0,0,0.4)">
    <circle cx="320" cy="258" r="7"/>
    <rect x="318" y="265" width="4" height="10" rx="2"/>
    <circle cx="370" cy="250" r="7"/>
    <rect x="368" y="257" width="4" height="10" rx="2"/>
    <circle cx="270" cy="255" r="7"/>
    <rect x="268" y="262" width="4" height="10" rx="2"/>
  </g>
  <!-- Large foreground protestors -->
  <g fill="rgba(0,0,0,0.55)">
    <circle cx="350" cy="288" r="22"/>
    <rect x="340" y="310" width="20" height="42" rx="4"/>
    <path d="M335 320 L320 290" stroke="rgba(0,0,0,0.55)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="320" cy="285" r="8"/>
  </g>
  <!-- Banner text area -->
  <rect x="220" y="340" width="160" height="35" rx="4" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="300" y="363" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold">हमारी मांगें सुनो!</text>
  <!-- Decorative elements -->
  <text x="80" y="120" text-anchor="middle" font-family="sans-serif" font-size="60" fill="rgba(255,255,255,0.12)">✊</text>
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#fff" font-weight="bold" opacity="0.9">धरना — न्याय की मांग</text>
  <text x="400" y="75" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">Hardoi, Uttar Pradesh</text>
</svg>
