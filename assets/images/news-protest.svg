<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="news1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b71c1c"/>
      <stop offset="100%" style="stop-color:#d32f2f"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#news1)"/>
  <text x="300" y="100" text-anchor="middle" font-family="sans-serif" font-size="60" fill="rgba(255,255,255,0.15)">📰</text>
  <!-- Microphone -->
  <line x1="280" y1="180" x2="280" y2="120" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
  <circle cx="280" cy="115" r="8" fill="rgba(255,255,255,0.3)"/>
  <ellipse cx="280" cy="125" rx="6" ry="3" fill="rgba(255,255,255,0.2)"/>
  <!-- Sound waves -->
  <path d="M300 120 Q320 130 300 140" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <path d="M310 110 Q340 130 310 150" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Title -->
  <text x="300" y="220" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#fff" font-weight="bold">ताज़ा खबरें — हरदोई की आवाज़</text>
  <text x="300" y="245" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">आपकी आवाज़, हमारी खबर</text>
  <!-- Bottom line -->
  <rect x="200" y="265" width="200" height="3" rx="1.5" fill="rgba(255,193,7,0.5)"/>
</svg>
