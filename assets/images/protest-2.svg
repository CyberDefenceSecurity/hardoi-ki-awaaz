<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="ground2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#37474f"/>
      <stop offset="100%" style="stop-color:#263238"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky2)"/>
  <!-- Stage light effect -->
  <ellipse cx="400" cy="200" rx="300" ry="200" fill="rgba(255,255,255,0.05)"/>
  <!-- Ground -->
  <rect x="0" y="350" width="800" height="150" fill="url(#ground2)"/>
  <!-- Speaker stage -->
  <rect x="300" y="280" width="200" height="70" rx="5" fill="rgba(255,255,255,0.12)"/>
  <rect x="310" y="270" width="180" height="15" rx="3" fill="rgba(255,255,255,0.08)"/>
  <!-- Speaker on stage -->
  <circle cx="400" cy="245" r="20" fill="rgba(0,0,0,0.35)"/>
  <rect x="392" y="265" width="16" height="20" rx="3" fill="rgba(0,0,0,0.35)"/>
  <!-- Speaker hands raised -->
  <line x1="385" y1="255" x2="365" y2="235" stroke="rgba(0,0,0,0.3)" stroke-width="4" stroke-linecap="round"/>
  <line x1="415" y1="255" x2="435" y2="235" stroke="rgba(0,0,0,0.3)" stroke-width="4" stroke-linecap="round"/>
  <!-- Microphone -->
  <line x1="370" y1="235" x2="365" y2="218" stroke="#888" stroke-width="3"/>
  <circle cx="365" cy="215" r="5" fill="#aaa"/>
  <!-- Crowd -->
  <g fill="rgba(0,0,0,0.3)">
    <circle cx="180" cy="320" r="16"/>
    <rect x="173" y="336" width="14" height="28" rx="3"/>
    <circle cx="230" cy="315" r="16"/>
    <rect x="223" y="331" width="14" height="28" rx="3"/>
    <circle cx="280" cy="322" r="15"/>
    <rect x="273" y="337" width="14" height="26" rx="3"/>
    <circle cx="520" cy="318" r="16"/>
    <rect x="513" y="334" width="14" height="28" rx="3"/>
    <circle cx="570" cy="325" r="15"/>
    <rect x="563" y="340" width="14" height="26" rx="3"/>
    <circle cx="620" cy="320" r="16"/>
    <rect x="613" y="336" width="14" height="28" rx="3"/>
    <circle cx="670" cy="315" r="15"/>
    <rect x="663" y="330" width="14" height="28" rx="3"/>
  </g>
  <!-- More crowd -->
  <g fill="rgba(0,0,0,0.25)">
    <circle cx="140" cy="325" r="14"/>
    <rect x="134" y="339" width="12" height="24" rx="3"/>
    <circle cx="660" cy="322" r="14"/>
    <rect x="654" y="336" width="12" height="24" rx="3"/>
    <circle cx="100" cy="330" r="13"/>
    <rect x="94" y="343" width="12" height="22" rx="3"/>
    <circle cx="720" cy="328" r="13"/>
    <rect x="714" y="341" width="12" height="22" rx="3"/>
  </g>
  <!-- Banner above crowd -->
  <rect x="200" y="345" width="200" height="32" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="300" y="366" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">जन सभा — हरदोई विकास</text>
  <!-- Location marker -->
  <text x="400" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">📍 Clock Tower, Hardoi</text>
  <!-- Decorative -->
  <text x="80" y="100" text-anchor="middle" font-family="sans-serif" font-size="55" fill="rgba(255,255,255,0.08)">📢</text>
  <text x="720" y="100" text-anchor="middle" font-family="sans-serif" font-size="40" fill="rgba(255,255,255,0.08)">🗣️</text>
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#fff" font-weight="bold" opacity="0.9">सार्वजनिक सभा</text>
  <text x="400" y="75" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">जनता की आवाज़ — बदलाव की शुरुआत</text>
</svg>
