<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Page</title>
    <style>
        #navbar { display: flex; gap: 10px; }
        .hidden { display: none; }
        #stats { margin-top: 20px; height: 1000px; }
    </style>
</head>
<body>
    <div id="navbar">
        <button id="menu-btn">Menu</button>
        <a href="#about">About</a>
        <button id="lang-toggle">EN</button>
    </div>
    <div id="menu" class="hidden">Links</div>
    <div id="stats">
        <span id="counter">0</span>
    </div>
    <script>
        console.log("Page loaded");
        document.getElementById('menu-btn').onclick = () => document.getElementById('menu').classList.toggle('hidden');
        document.getElementById('lang-toggle').onclick = (e) => {
            e.target.innerText = e.target.innerText === 'EN' ? 'HI' : 'EN';
        };
        setTimeout(() => { document.getElementById('counter').innerText = '100'; }, 1000);
    </script>
</body>
</html>
